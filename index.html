<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brotato Web</title>
<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #000;
    overflow: hidden;
}
#canvas {
    width: 100vw;
    height: 100vh;
    display: block;
}
#status {
    position: absolute;
    top: 20px;
    width: 100%;
    text-align: center;
    color: #fff;
    font-family: sans-serif;
    font-size: 18px;
}
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="status">Loading…</div>

<script src="https://benmillhei-start.github.io/brotato-web420/Brotato.js"></script>
<script>
const BASE = "https://benmillhei-start.github.io/brotato-web420/";

const engine = new Engine({
    executable: "Brotato",
    canvas: document.getElementById("canvas"),
    focusCanvas: true,
    canvasResizePolicy: 2,
    fileSizes: {
        "Brotato.pck": 0,
        "Brotato.wasm": 0
    }
});

engine.startGame({
    onProgress: (current, total) => {
        const mb = (current / 1048576).toFixed(2);
        document.getElementById("status").textContent = `Loading: ${mb} MB`;
    }
}).then(() => {
    document.getElementById("status").style.display = "none";
}).catch(err => {
    document.getElementById("status").textContent = "Error loading game.";
    console.error(err);
});
</script>
</body>
</html>
